name: Seva_Setu
description: AI-Powered Grievance Intelligence System - User Mobile App (Phase 4 Complete)
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  cupertino_icons: ^1.0.6

  # Firebase (Latest Stable Compatible Set)
  firebase_core: ^4.5.0
  firebase_auth: ^6.2.0
  google_sign_in: ^6.2.1
  firebase_messaging: ^15.1.3

  # HTTP & API
  http: ^1.2.0
  http_parser: ^4.0.2

  # Phase 4: Image Upload
  image_picker: ^1.0.7

  # Phase 4: Location Tracking
  geolocator: ^11.0.0
  geocoding: ^3.0.0

  # Phase 4: Audio Complaints
  record: ^5.0.4
  audioplayers: ^5.2.1
  permission_handler: ^11.2.0
  path_provider: ^2.1.2

  # Phase 4: Real-time Chat
  socket_io_client: ^2.0.3+1

  # State Management
  provider: ^6.1.1

  # Storage
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^10.0.0

  # UI & Localization
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true

